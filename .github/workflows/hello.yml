name: My First Workflow

on:
  push:
    branches: [ main ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout my code
      uses: actions/checkout@v4

    - name: list all files
      run: ls -la

    - name: check index.html file exists
      run: test -f index.html
      
  notify-done: 

    runs-on: ubuntu-latest

    needs: check-files

    steps:
    - name: success message
      run: echo "Check-files is passed"

  